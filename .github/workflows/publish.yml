name: Publish

# Publishes to PyPI when a GitHub Release is published. Uses PyPI Trusted
# Publishing (OIDC): no API token is stored in the repo. See RELEASING.md and
# the one-time PyPI setup before the first release.
on:
  release:
    types: [published]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build and validate the distribution
        run: |
          python -m pip install build twine
          python -m build
          twine check dist/*
      - uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/recension
    permissions:
      id-token: write  # required for PyPI Trusted Publishing
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
