# Example configuration for the recension CLI:
#
#   recension run --config examples/cli/run.yaml
#
# Every key the CLI understands is shown; optional keys note their defaults.
# Run it from the repo root so the relative evalset path resolves.

# The text artifact to optimize. Use `text:` for inline text, or `path:` to
# load it from a file. `name` is optional (defaults to "artifact", or the file
# stem when using `path`).
artifact:
  text: "Label the sentiment of the message."
  name: sentiment-prompt

# Held-out examples as a JSONL file. Each record needs `id`, `input`, and
# `split` ("train" or "validation"). `expected` is required by exact_match and
# f1; `rubric` is required by llm_judge.
evalset:
  path: examples/cli/data.jsonl

# How outputs are scored. `name` is one of: exact_match | f1 | llm_judge.
#   exact_match  - optional `case_sensitive: false`
#   f1           - token-level F1, no extra options
#   llm_judge    - optional `rubric: "..."`; the model below does the grading
objective:
  name: exact_match

# The frozen model. `backend` is one of: mock (offline, deterministic, no key),
# anthropic, openai, gemini, or ollama. Hosted providers need their extra and
# their API key in the environment (ANTHROPIC_API_KEY / OPENAI_API_KEY /
# GEMINI_API_KEY); the key is read from the environment only, never this file.
model:
  backend: mock
  seed: 0                    # mock only: makes the deterministic mock reproducible
  # model: claude-opus-4-8   # the provider's model id (any backend)
  # base_url: https://...    # openai only: point at an OpenAI-compatible server
  # host: http://localhost:11434   # ollama only: the local server

# Update-time compute. All optional; defaults shown.
budget:
  candidates_per_round: 4
  rounds: 3
  diagnosis_depth: 1
  max_model_calls: 200       # hard ceiling across all calls; omit for unlimited

seed: 7                       # optional: makes the whole run reproducible against the mock
min_improvement: 0.000001     # optional: margin a candidate must beat the incumbent by (default 1e-6)
strict_leakage: false         # optional: raise on a leakage-flagged winner instead of accepting it

# Honest-measurement options (all optional).
accept_significant: false     # require the validation gain to be statistically significant, not just > margin
alpha: 0.05                   # significance level for the bootstrap CI (95% interval)
bootstrap_resamples: 2000     # resamples for the significance bootstrap
overfit_gap: 0.1              # flag overfitting if the final validation score beats the test score by more than this
# (add records with split: "test" to data.jsonl to get a locked, scored-once test estimate)

# Multi-dimensional options (all optional). slice_by is active here: the dataset
# tags each example with a "domain" so the record reports per-subgroup scores.
slice_by: domain              # an Example metadata key; reports per-subgroup baseline->final scores
slice_tolerance: 0.0          # announce a slice as regressed when it drops by more than this
# guards:                     # secondary objectives that must not regress for a candidate to be accepted
#   - {name: max_length, max_chars: 200}
# guard_tolerance: 0.0        # allowed drop on a guard before it counts as a regression

output: run_record.json       # where to write the audit record
# write_artifact: optimized_prompt.txt   # optional: also write the final artifact text
