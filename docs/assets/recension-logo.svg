<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 440 120" role="img" aria-label="recension">
  <defs>
    <linearGradient id="badge" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#7c5fb8"/>
      <stop offset="1" stop-color="#523f86"/>
    </linearGradient>
  </defs>
  <!-- Icon: editorial angle brackets (textual-criticism sigla) framing stacked
       variant readings, with the middle one emphasized as the accepted reading. -->
  <g transform="translate(16,16)">
    <rect width="88" height="88" rx="20" fill="url(#badge)"/>
    <g fill="none" stroke="#efeaf9" stroke-width="3.2" stroke-linecap="round" stroke-linejoin="round" opacity="0.92">
      <path d="M30 27 L21 44 L30 61"/>
      <path d="M58 27 L67 44 L58 61"/>
    </g>
    <rect x="33" y="33" width="22" height="4" rx="2" fill="#ffffff" opacity="0.4"/>
    <rect x="30" y="42" width="28" height="5" rx="2.5" fill="#ffffff"/>
    <rect x="33" y="51" width="18" height="4" rx="2" fill="#ffffff" opacity="0.4"/>
  </g>
  <!-- Wordmark -->
  <text x="120" y="75" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="54" font-weight="600" letter-spacing="-1.5" fill="#2b2342">recension</text>
</svg>
